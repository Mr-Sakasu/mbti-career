<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MBTI×業界 傾向診断</title>
<style>
  :root {
    --bg: #F3F6F5;
    --surface: #FFFFFF;
    --ink: #182524;
    --muted: #5C6B68;
    --border: #DBE3E0;
    --accent: #0E7C6E;
    --accent-ink: #FFFFFF;
    --chip: #E5F0ED;
    --pos: #009E85;
    --neg: #C05621;
    --track: #E7EDEB;
    --shadow: 0 1px 2px rgba(24, 37, 36, 0.05), 0 4px 16px rgba(24, 37, 36, 0.06);
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0F1413;
      --surface: #171E1C;
      --ink: #E7ECEA;
      --muted: #97A5A1;
      --border: #2A3330;
      --accent: #37B5A4;
      --accent-ink: #0F1413;
      --chip: #1F2C29;
      --pos: #24A896;
      --neg: #CE7439;
      --track: #232C2A;
      --shadow: 0 1px 2px rgba(0, 0, 0, 0.3), 0 4px 16px rgba(0, 0, 0, 0.25);
    }
  }
  :root[data-theme="light"] {
    --bg: #F3F6F5;
    --surface: #FFFFFF;
    --ink: #182524;
    --muted: #5C6B68;
    --border: #DBE3E0;
    --accent: #0E7C6E;
    --accent-ink: #FFFFFF;
    --chip: #E5F0ED;
    --pos: #009E85;
    --neg: #C05621;
    --track: #E7EDEB;
    --shadow: 0 1px 2px rgba(24, 37, 36, 0.05), 0 4px 16px rgba(24, 37, 36, 0.06);
  }
  :root[data-theme="dark"] {
    --bg: #0F1413;
    --surface: #171E1C;
    --ink: #E7ECEA;
    --muted: #97A5A1;
    --border: #2A3330;
    --accent: #37B5A4;
    --accent-ink: #0F1413;
    --chip: #1F2C29;
    --pos: #24A896;
    --neg: #CE7439;
    --track: #232C2A;
    --shadow: 0 1px 2px rgba(0, 0, 0, 0.3), 0 4px 16px rgba(0, 0, 0, 0.25);
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--ink);
    font-family: "Hiragino Kaku Gothic ProN", "Hiragino Sans", "Noto Sans CJK JP", "Yu Gothic UI", "Yu Gothic", Meiryo, sans-serif;
    font-size: 15px;
    line-height: 1.7;
    -webkit-font-smoothing: antialiased;
  }
  button { font-family: inherit; color: inherit; }
  button:focus-visible, a:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

  .app { max-width: 1060px; margin: 0 auto; padding: 28px 20px 48px; }

  /* ---------- header ---------- */
  .site-head { display: flex; align-items: center; gap: 14px; margin-bottom: 26px; }
  .mark {
    width: 48px; height: 48px; flex: none; border-radius: 12px;
    background: var(--accent); color: var(--accent-ink);
    display: grid; place-items: center;
    font-size: 23px; font-weight: 700;
  }
  .site-head h1 { margin: 0; font-size: 22px; font-weight: 800; letter-spacing: 0.01em; text-wrap: balance; }
  .site-head p { margin: 2px 0 0; font-size: 14px; color: var(--muted); }

  /* ---------- layout ---------- */
  .cols { display: grid; grid-template-columns: 1fr; gap: 18px; }
  @media (min-width: 920px) {
    .cols { grid-template-columns: 410px 1fr; align-items: start; }
  }
  .panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    box-shadow: var(--shadow);
    padding: 24px;
  }
  .inputs { display: flex; flex-direction: column; gap: 28px; }
  .results { display: flex; flex-direction: column; gap: 18px; }

  .step-label { display: flex; align-items: baseline; gap: 8px; margin-bottom: 12px; }
  .step-no { font-size: 12px; font-weight: 700; letter-spacing: 0.12em; color: var(--accent); }
  .step-title { font-size: 16.5px; font-weight: 700; }
  .step-note { font-size: 13.5px; color: var(--muted); margin: -8px 0 12px; }

  /* ---------- MBTI toggles ---------- */
  .axis-row { margin-bottom: 12px; }
  .axis-name { font-size: 12.5px; color: var(--muted); margin-bottom: 4px; letter-spacing: 0.04em; }
  .seg { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
  .seg button {
    border: 1px solid var(--border); background: var(--surface);
    border-radius: 10px; padding: 9px 10px; cursor: pointer;
    display: flex; align-items: center; justify-content: center; gap: 8px;
    font-size: 14.5px; transition: background 0.15s, border-color 0.15s, color 0.15s;
  }
  .seg button .ltr { font-weight: 800; font-size: 17px; }
  .seg button[aria-pressed="true"] {
    background: var(--accent); border-color: var(--accent); color: var(--accent-ink);
  }
  .seg button:hover:not([aria-pressed="true"]) { border-color: var(--accent); }

  .type-now {
    margin-top: 16px; padding: 15px 17px; border-radius: 12px;
    background: var(--chip); display: flex; gap: 15px; align-items: center;
  }
  .type-code { font-size: 34px; font-weight: 800; letter-spacing: 0.05em; }
  .type-meta .type-label { font-weight: 700; font-size: 15.5px; }
  .type-meta .type-desc { font-size: 13.5px; color: var(--muted); margin-top: 2px; }

  /* ---------- vote form ---------- */
  .ind-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .ind-card {
    border: 1px solid var(--border); background: var(--surface);
    border-radius: 12px; padding: 11px 12px; cursor: pointer; text-align: left;
    display: flex; align-items: center; gap: 10px;
    transition: border-color 0.15s, background 0.15s;
  }
  .ind-card:hover { border-color: var(--accent); }
  .ind-card .tile {
    width: 36px; height: 36px; flex: none; border-radius: 9px;
    background: var(--chip); color: var(--accent);
    display: grid; place-items: center; font-weight: 700; font-size: 17px;
    transition: background 0.15s, color 0.15s;
  }
  .ind-card .ind-name { font-size: 14px; font-weight: 700; line-height: 1.35; }
  .ind-card[aria-pressed="true"] { border-color: var(--accent); background: var(--chip); }
  .ind-card[aria-pressed="true"] .tile { background: var(--accent); color: var(--accent-ink); }

  .vote-btn {
    margin-top: 14px; width: 100%;
    border: none; border-radius: 12px; padding: 13px 16px;
    background: var(--accent); color: var(--accent-ink);
    font-size: 15.5px; font-weight: 700; cursor: pointer;
    transition: opacity 0.15s;
  }
  .vote-btn:disabled { opacity: 0.45; cursor: not-allowed; }
  .vote-done {
    margin-top: 4px; padding: 15px 17px; border-radius: 12px;
    background: var(--chip); font-size: 14.5px; line-height: 1.7;
  }
  .vote-done b { color: var(--accent); }
  .vote-error { margin-top: 10px; font-size: 13.5px; color: var(--neg); }

  /* ---------- analysis panel ---------- */
  .panel-head { display: flex; align-items: baseline; gap: 10px; flex-wrap: wrap; margin-bottom: 6px; }
  .panel-head h2 { margin: 0; font-size: 19px; font-weight: 800; text-wrap: balance; }
  .n-badge {
    font-size: 12.5px; font-weight: 700; color: var(--accent);
    background: var(--chip); border-radius: 999px; padding: 3px 12px;
    font-variant-numeric: tabular-nums;
  }
  .demo-badge {
    font-size: 12px; font-weight: 700; color: var(--neg);
    border: 1px solid var(--neg); border-radius: 999px; padding: 2px 10px;
  }
  .tabs { display: flex; gap: 6px; flex-wrap: wrap; margin: 10px 0 6px; }
  .tab-btn {
    border: 1px solid var(--border); background: var(--surface);
    border-radius: 999px; padding: 7px 17px;
    font-size: 14px; font-weight: 700; cursor: pointer;
    transition: background 0.15s, border-color 0.15s, color 0.15s;
  }
  .tab-btn:hover:not([aria-pressed="true"]) { border-color: var(--accent); }
  .tab-btn[aria-pressed="true"] { background: var(--accent); border-color: var(--accent); color: var(--accent-ink); }
  .panel-sub { font-size: 13.5px; color: var(--muted); margin: 0 0 14px; }

  /* 業界分布タブ */
  .dist { display: flex; flex-direction: column; gap: 4px; }
  .dist-row {
    display: grid; grid-template-columns: 138px 1fr 92px;
    align-items: center; gap: 10px;
    border: 1px solid transparent; border-radius: 10px; padding: 7px 9px;
    background: none; cursor: pointer; width: 100%; text-align: left;
    transition: background 0.15s, border-color 0.15s;
  }
  .dist-row:hover { background: var(--chip); }
  .dist-row[data-current="true"] { border-color: var(--accent); background: var(--chip); }
  .dist-name { display: flex; align-items: center; gap: 9px; min-width: 0; }
  .dist-name .tile {
    width: 28px; height: 28px; flex: none; border-radius: 8px;
    background: var(--chip); color: var(--accent);
    display: grid; place-items: center; font-weight: 700; font-size: 13.5px;
  }
  .dist-row[data-current="true"] .dist-name .tile { background: var(--accent); color: var(--accent-ink); }
  .dist-name span:last-child { font-size: 14px; font-weight: 700; line-height: 1.3; }
  .dist-bar { height: 13px; border-radius: 5px; background: var(--track); overflow: hidden; }
  .dist-bar i {
    display: block; height: 100%; border-radius: 5px; background: var(--pos);
    min-width: 2px;
    transition: width 0.5s cubic-bezier(0.22, 1, 0.36, 1);
  }
  .dist-val { font-size: 14.5px; font-weight: 700; font-variant-numeric: tabular-nums; text-align: right; white-space: nowrap; }
  .dist-val small { color: var(--muted); font-weight: 600; font-size: 12px; }
  .chart-note { font-size: 12.5px; color: var(--muted); margin: 12px 0 0; }
  @media (max-width: 540px) {
    .dist-row { grid-template-columns: 118px 1fr 82px; gap: 8px; }
  }

  /* 職種ランキングタブ */
  .rank-list { display: flex; flex-direction: column; gap: 4px; }
  .r-row {
    display: grid; grid-template-columns: 34px 1fr 74px;
    align-items: center; gap: 10px;
    border: 1px solid transparent; border-radius: 10px; padding: 8px 10px;
    background: none; cursor: pointer; width: 100%; text-align: left;
    transition: background 0.15s, border-color 0.15s;
  }
  .r-row:hover { background: var(--chip); }
  .r-no { font-size: 16px; font-weight: 800; color: var(--accent); font-variant-numeric: tabular-nums; }
  .r-role { font-size: 15px; font-weight: 700; line-height: 1.4; }
  .r-ind { font-size: 12.5px; color: var(--muted); }
  .r-pct { font-size: 14.5px; font-weight: 700; font-variant-numeric: tabular-nums; text-align: right; }

  /* 似ているタイプタブ */
  .s-row {
    display: grid; grid-template-columns: 128px 1fr 64px;
    align-items: center; gap: 10px;
    border: 1px solid transparent; border-radius: 10px; padding: 9px 10px;
    background: none; cursor: pointer; width: 100%; text-align: left;
    transition: background 0.15s, border-color 0.15s;
  }
  .s-row:hover { background: var(--chip); border-color: var(--accent); }
  .s-code { font-size: 16px; font-weight: 800; letter-spacing: 0.04em; }
  .s-code small { display: block; font-size: 12.5px; color: var(--muted); font-weight: 600; letter-spacing: 0; }
  .s-bar { height: 13px; border-radius: 5px; background: var(--track); overflow: hidden; }
  .s-bar i { display: block; height: 100%; border-radius: 5px; background: var(--pos); transition: width 0.5s cubic-bezier(0.22, 1, 0.36, 1); }
  .s-val { font-size: 14.5px; font-weight: 700; font-variant-numeric: tabular-nums; text-align: right; }

  /* ---------- loading / error ---------- */
  .state-box { text-align: center; padding: 44px 16px; color: var(--muted); font-size: 14.5px; }
  .spinner {
    width: 28px; height: 28px; margin: 0 auto 12px;
    border: 3px solid var(--track); border-top-color: var(--accent);
    border-radius: 50%; animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .retry-btn {
    margin-top: 12px; border: 1px solid var(--border); background: var(--surface);
    border-radius: 10px; padding: 9px 22px; font-size: 14px; font-weight: 700; cursor: pointer;
  }
  .retry-btn:hover { border-color: var(--accent); }

  /* ---------- industry detail ---------- */
  .detail-head { display: flex; align-items: flex-start; gap: 13px; margin-bottom: 14px; }
  .detail-head .tile {
    width: 44px; height: 44px; flex: none; border-radius: 11px;
    background: var(--accent); color: var(--accent-ink);
    display: grid; place-items: center; font-weight: 700; font-size: 20px;
  }
  .detail-head h3 { margin: 0; font-size: 18px; font-weight: 800; }
  .detail-head p { margin: 2px 0 0; font-size: 13.5px; color: var(--muted); line-height: 1.6; }

  .sec-title { font-size: 15px; font-weight: 700; margin: 0 0 10px; letter-spacing: 0.03em; }
  .you-line { font-size: 14.5px; background: var(--chip); border-radius: 10px; padding: 10px 14px; margin: 0 0 12px; line-height: 1.7; }
  .you-line b { color: var(--accent); }
  .mbti-dist { display: grid; grid-template-columns: 1fr; gap: 3px 24px; }
  @media (min-width: 760px) {
    .mbti-dist { grid-template-columns: 1fr 1fr; grid-auto-flow: column; grid-template-rows: repeat(8, auto); }
  }
  .m-row {
    display: grid; grid-template-columns: 112px 1fr 86px;
    align-items: center; gap: 10px; padding: 5px 9px;
    border-radius: 8px; border: 1px solid transparent;
  }
  .m-row .m-code { font-size: 14px; font-weight: 800; letter-spacing: 0.03em; white-space: nowrap; }
  .m-row[data-you="true"] { background: var(--chip); border-color: var(--accent); }
  .m-bar { height: 11px; border-radius: 4px; background: var(--track); overflow: hidden; }
  .m-bar i {
    display: block; height: 100%; border-radius: 4px; background: var(--pos);
    min-width: 2px; transition: width 0.5s cubic-bezier(0.22, 1, 0.36, 1);
  }
  .m-val { font-size: 13.5px; font-weight: 700; font-variant-numeric: tabular-nums; text-align: right; white-space: nowrap; }
  .m-val small { color: var(--muted); font-weight: 600; font-size: 11.5px; }
  .you-chip {
    display: inline-block; font-size: 11px; font-weight: 700;
    background: var(--accent); color: var(--accent-ink);
    border-radius: 999px; padding: 1px 8px; margin-left: 6px; vertical-align: 1px;
  }

  .role-chips { display: flex; flex-wrap: wrap; gap: 7px; }
  .role-chips span {
    background: var(--chip); border-radius: 999px; padding: 5px 14px;
    font-size: 13.5px; font-weight: 600;
  }
  .divider { border: none; border-top: 1px solid var(--border); margin: 18px 0; }

  footer.note {
    margin-top: 26px; font-size: 12.5px; color: var(--muted); text-align: center; line-height: 1.9;
  }

  @media (prefers-reduced-motion: reduce) {
    * { transition: none !important; animation: none !important; }
  }
</style>
</head>
<body>
<div class="app">
  <header class="site-head">
    <div class="mark" aria-hidden="true">相</div>
    <div>
      <h1>MBTI × 志望業界 傾向診断</h1>
      <p>あなたと同じMBTIタイプの人が、どの業界・職種を志望しているかが見られます</p>
    </div>
  </header>

  <div class="cols">
    <section class="panel inputs" aria-label="入力">
      <div>
        <div class="step-label"><span class="step-no">STEP 1</span><span class="step-title">あなたのMBTIタイプ</span></div>
        <div id="axisToggles"></div>
        <div class="type-now">
          <div class="type-code" id="typeCode"></div>
          <div class="type-meta">
            <div class="type-label" id="typeLabel"></div>
            <div class="type-desc" id="typeDesc"></div>
          </div>
        </div>
      </div>
      <div>
        <div class="step-label"><span class="step-no">STEP 2</span><span class="step-title">あなたの志望業界を投稿</span></div>
        <p class="step-note">あなたの回答が「同じタイプの人の傾向」のデータになります(1人1回・複数選択可)。</p>
        <div id="voteArea"></div>
      </div>
    </section>

    <section class="results" aria-label="傾向分析と業界詳細">
      <div class="panel" id="chartPanel" aria-live="polite"></div>
      <div class="panel" id="detailPanel"></div>
    </section>
  </div>

  <footer class="note">
    本アプリの傾向データは訪問者の投稿(+初期シードデータ)にもとづく参考コンテンツです。<br>
    適職・適性を保証するものではありません。業界研究のきっかけとしてお楽しみください。
  </footer>
</div>

<script>
// backend/setup.sh 実行後に表示される Function URL を設定する(末尾スラッシュなし)。
// 空のままの場合はデモモード(擬似データ)で動作する。
const API_URL = "https://5oqpofuosqgdn2tntlma5hd2ia0zimje.lambda-url.ap-northeast-1.on.aws";

/*__DATA_AND_LOGIC__*/
const AXES = [
  { key: "EI", pos: "E", neg: "I", posLabel: "外向", negLabel: "内向", name: "エネルギーの向き" },
  { key: "SN", pos: "S", neg: "N", posLabel: "感覚", negLabel: "直観", name: "ものの見方" },
  { key: "TF", pos: "T", neg: "F", posLabel: "思考", negLabel: "感情", name: "判断のしかた" },
  { key: "JP", pos: "J", neg: "P", posLabel: "計画", negLabel: "柔軟", name: "外界との関わり" }
];

const TYPES = {
  ISTJ: { label: "着実な実務家", desc: "決めたことをやり抜く責任感と正確さが持ち味。手順の整った環境で力を発揮します。" },
  ISFJ: { label: "支える堅実派", desc: "細やかな気配りと丁寧な仕事ぶりが強み。人の役に立つ実感がモチベーションに。" },
  INFJ: { label: "静かな理想家", desc: "本質を見抜く洞察力と理想への粘り強さ。意義を感じられる仕事で長く輝きます。" },
  INTJ: { label: "構想する戦略家", desc: "長期視点で物事を設計し独力で完遂するタイプ。非効率の改善に燃えます。" },
  ISTP: { label: "冷静な職人", desc: "手を動かして仕組みを理解するのが得意。トラブルにも動じない現場対応力。" },
  ISFP: { label: "感性の実践者", desc: "自分の美意識を大切に、目の前の仕事へ丁寧に向き合う柔らかな協調型。" },
  INFP: { label: "価値を紡ぐ人", desc: "信じる意義を仕事に重ねたいタイプ。共感力と独自の発想で心に届くものを作ります。" },
  INTP: { label: "探究する分析家", desc: "知的好奇心で構造を解き明かすのが得意。「なぜ」を突き詰める深い思考が武器。" },
  ESTP: { label: "動く勝負師", desc: "まず動いて場を掴む行動力と度胸。変化の速い環境や交渉の最前線で生きます。" },
  ESFP: { label: "場を明るくする人", desc: "空気を読んで人を巻き込む力は随一。現場で人と接する仕事で輝きます。" },
  ENFP: { label: "情熱のアイデア屋", desc: "好奇心と人懐こさで可能性を見つける。ゼロイチの企画と巻き込みが得意。" },
  ENTP: { label: "切り込む発想家", desc: "枠組みに疑問を投げ、議論で前に進めるタイプ。変革の場面で真価を発揮。" },
  ESTJ: { label: "仕切る推進者", desc: "目標達成へ組織を動かす統率力。数字と計画で物事を確実に前へ進めます。" },
  ESFJ: { label: "気配りの調整役", desc: "チームの和を保ちつつ実務を回す調整力。信頼関係を築くのが早いタイプ。" },
  ENFJ: { label: "導く世話役", desc: "人の成長と一体感に喜びを感じるリーダー型。励まし、まとめる力に長けます。" },
  ENTJ: { label: "果断な指揮官", desc: "大きな目標を掲げ合理的に率いる推進力。競争環境でこそ燃えるタイプです。" }
};
const TYPE_CODES = Object.keys(TYPES);

const INDUSTRIES = [
  { id: "it", kanji: "信", name: "IT・通信",
    desc: "システム開発・ネットワーク・SIerなど、社会のインフラを支える技術領域。",
    roles: ["システムエンジニア", "インフラエンジニア", "ITコンサルタント", "プリセールス", "プロジェクトマネージャー"],
    w: { EI: -0.5, SN: -1, TF: 1.5, JP: 0.5 } },
  { id: "web", kanji: "創", name: "Web・スタートアップ",
    desc: "自社サービスの企画開発やベンチャーでの事業立ち上げなど、変化の速い成長環境。",
    roles: ["Webエンジニア", "プロダクトマネージャー", "UI/UXデザイナー", "グロースマーケター", "事業開発"],

const IND = (id) => INDUSTRIES.find((i) => i.id === id);

// ===== 分析ロジック(すべて counts 行列からの純関数) =====
// counts = { INTJ: { it: 10, consul: 4, ... }, ... }
// 新しい分析を追加するときは、ここに純関数を書き、末尾の ANALYSES にタブを1つ足すだけでよい。

function buildCounts(items) {
  const counts = {};
  for (const code of TYPE_CODES) counts[code] = {};
  for (const it of items) {
    if (counts[it.type] && IND(it.industry)) counts[it.type][it.industry] = it.count;
  }
  return counts;
}

// タイプ → 業界分布
function typeDist(counts, code) {
  const row = counts[code] || {};
  const items = INDUSTRIES
    .map((ind) => ({ industry: ind.id, count: row[ind.id] || 0 }))
    .sort((a, b) => b.count - a.count);
  return { items, total: items.reduce((a, i) => a + i.count, 0) };
}

// 業界 → タイプ分布
function industryDist(counts, industryId) {
  const items = TYPE_CODES
    .map((code) => ({ type: code, count: (counts[code] || {})[industryId] || 0 }))
    .sort((a, b) => b.count - a.count);
  return { items, total: items.reduce((a, i) => a + i.count, 0) };
}

// タイプ → 職種ランキング(業界票からの推定。業界内の代表順に減衰させて並べる)
function roleRanking(counts, code, limit = 10) {
  const { items, total } = typeDist(counts, code);
  const out = [];
  for (const item of items) {
    const ind = IND(item.industry);
    const pct = total ? (100 * item.count / total) : 0;
    ind.roles.forEach((role, i) => {
      // 業界内の代表度を強めに減衰させ、1業界の職種でランキングが埋まらないようにする
      out.push({ role, ind, pct: Math.round(pct), score: pct * Math.pow(0.62, i) });
    });
  }
  out.sort((a, b) => b.score - a.score);
  return out.slice(0, limit);
}

// 志望傾向が似ているタイプ(業界分布ベクトルのコサイン類似度)
function similarTypes(counts, code, k = 5) {
  const vec = (c) => INDUSTRIES.map((ind) => (counts[c] || {})[ind.id] || 0);
  const norm = (v) => Math.sqrt(v.reduce((a, x) => a + x * x, 0)) || 1;
  const base = vec(code), nb = norm(base);
  return TYPE_CODES
    .filter((c) => c !== code)
    .map((c) => {
      const v = vec(c);
      const sim = v.reduce((a, x, i) => a + x * base[i], 0) / (nb * norm(v));
      const top = typeDist(counts, c).items[0];
      return { type: c, sim, topIndustry: top ? top.industry : null };
    })
    .sort((a, b) => b.sim - a.sim)
    .slice(0, k);
}

// デモモード用: seed.py と同じsoftmaxロジックで擬似行列を作る(API未設定時のみ使用)
function demoMatrixItems() {
  const T = 15, TOTAL = 30;
  const items = [];
  for (const code of TYPE_CODES) {
    const scores = INDUSTRIES.map((ind) => {
      let s = 50;
      AXES.forEach((a, i) => {
        const v = code[i] === a.pos ? 1 : -1;
        s += v * (ind.w[a.key] || 0) * 10;
      });
      return { id: ind.id, s };
    });
    const maxS = Math.max(...scores.map((x) => x.s));
    const exps = scores.map((x) => ({ id: x.id, e: Math.exp((x.s - maxS) / T) }));
    const denom = exps.reduce((acc, x) => acc + x.e, 0);
    for (const x of exps) {
      items.push({ type: code, industry: x.id, count: 1 + Math.round((TOTAL - INDUSTRIES.length) * x.e / denom) });
    }
  }
  return items;
}

// ---------- state ----------
const VOTE_KEY = "mbtiCareerVote";
const state = {
  poles: { EI: "I", SN: "N", TF: "T", JP: "J" },
  tab: "industries",
  detailIndustry: null,
  voteChoices: [],
  voting: false,
  voteError: null,
  counts: null,   // 票数行列(全分析の唯一のデータ源)
  loading: false,
  error: null
};

const $ = (id) => document.getElementById(id);
const isDemo = () => API_URL === "";

function currentType() {
  return AXES.map((a) => state.poles[a.key]).join("");
}

function esc(s) {
  return s.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
}

function savedVote() {
  try {
    const v = JSON.parse(localStorage.getItem(VOTE_KEY) || "null");
    if (!v || !TYPES[v.type]) return null;
    const industries = v.industries || (v.industry ? [v.industry] : []); // 旧形式互換
    if (industries.length === 0 || industries.some((i) => !IND(i))) return null;
    if (v.demo && !isDemo()) return null; // デモ中の投稿は本番では無効
    return { ...v, industries };
  } catch { return null; }
}

// ---------- data fetching ----------
let fetchSeq = 0;
async function loadMatrix() {
  if (isDemo()) {
    state.counts = buildCounts(demoMatrixItems());
    state.loading = false;
    state.error = null;
    renderChart();
    renderDetail();
    return;
  }
  const seq = ++fetchSeq;
  state.loading = true;
  state.error = null;
  renderChart();
  renderDetail();
  try {
    const res = await fetch(`${API_URL}/matrix`);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    if (seq !== fetchSeq) return;
    state.counts = buildCounts(data.items || []);
    state.loading = false;
  } catch (e) {
    if (seq !== fetchSeq) return;
    state.loading = false;
    state.error = "データを取得できませんでした。通信環境を確認してください。";
  }
  renderChart();
  renderDetail();
}

async function submitVote() {
  const code = currentType();
  const industries = state.voteChoices;
  if (industries.length === 0 || savedVote()) return;
  state.voting = true;
  state.voteError = null;
  renderVoteArea();
  try {
    if (isDemo()) {
      await new Promise((r) => setTimeout(r, 300));
    } else {
      const res = await fetch(`${API_URL}/vote`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ type: code, industries })
      });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
    }
    localStorage.setItem(VOTE_KEY, JSON.stringify({
      type: code, industries, at: new Date().toISOString(), demo: isDemo()
    }));
    state.voting = false;
    renderVoteArea();
    loadMatrix(); // 自分の票を全分析に反映
  } catch (e) {
    state.voting = false;
    state.voteError = "投稿に失敗しました。時間をおいて再度お試しください。";
    renderVoteArea();
  }
}

function renderSimilarTab(code) {
  const sims = similarTypes(state.counts, code, 5);

  const total = state.counts ? typeDist(state.counts, code).total : 0;
  const head = `
    <div class="panel-head">
      <h2>${code}(${esc(t.label)})の傾向分析</h2>

    </div>
    <p class="panel-sub">${analysis.sub}</p>`;

  if (state.loading) {
    panel.innerHTML = head + `<div class="state-box"><div class="spinner" aria-hidden="true"></div>読み込み中…</div>`;
  } else if (state.error) {
    panel.innerHTML = head + `

    <div class="role-chips">${ind.roles.map((r) => `<span>${esc(r)}</span>`).join("")}</div>`;
}
