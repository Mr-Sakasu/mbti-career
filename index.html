<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MBTI×業界 傾向診断</title>
<style>
  :root {
    --bg: #F3F6F5;
    --surface: #FFFFFF;
    --ink: #182524;
    --muted: #5C6B68;
    --border: #DBE3E0;
    --accent: #0E7C6E;
    --accent-ink: #FFFFFF;
    --chip: #E5F0ED;
    --pos: #009E85;
    --neg: #C05621;
    --track: #E7EDEB;
    --shadow: 0 1px 2px rgba(24, 37, 36, 0.05), 0 4px 16px rgba(24, 37, 36, 0.06);
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0F1413;
      --surface: #171E1C;
      --ink: #E7ECEA;
      --muted: #97A5A1;
      --border: #2A3330;
      --accent: #37B5A4;
      --accent-ink: #0F1413;
      --chip: #1F2C29;
      --pos: #24A896;
      --neg: #CE7439;
      --track: #232C2A;
      --shadow: 0 1px 2px rgba(0, 0, 0, 0.3), 0 4px 16px rgba(0, 0, 0, 0.25);
    }
  }
  :root[data-theme="light"] {
    --bg: #F3F6F5;
    --surface: #FFFFFF;
    --ink: #182524;
    --muted: #5C6B68;
    --border: #DBE3E0;
    --accent: #0E7C6E;
    --accent-ink: #FFFFFF;
    --chip: #E5F0ED;
    --pos: #009E85;
    --neg: #C05621;
    --track: #E7EDEB;
    --shadow: 0 1px 2px rgba(24, 37, 36, 0.05), 0 4px 16px rgba(24, 37, 36, 0.06);
  }
  :root[data-theme="dark"] {
    --bg: #0F1413;
    --surface: #171E1C;
    --ink: #E7ECEA;
    --muted: #97A5A1;
    --border: #2A3330;
    --accent: #37B5A4;
    --accent-ink: #0F1413;
    --chip: #1F2C29;
    --pos: #24A896;
    --neg: #CE7439;
    --track: #232C2A;
    --shadow: 0 1px 2px rgba(0, 0, 0, 0.3), 0 4px 16px rgba(0, 0, 0, 0.25);
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--ink);
    font-family: "Hiragino Kaku Gothic ProN", "Hiragino Sans", "Noto Sans CJK JP", "Yu Gothic UI", "Yu Gothic", Meiryo, sans-serif;
    line-height: 1.7;
    -webkit-font-smoothing: antialiased;
  }
  button { font-family: inherit; color: inherit; }
  button:focus-visible, a:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

  .app { max-width: 1020px; margin: 0 auto; padding: 28px 20px 48px; }

  /* ---------- header ---------- */
  .site-head { display: flex; align-items: center; gap: 14px; margin-bottom: 26px; }
  .mark {
    width: 46px; height: 46px; flex: none; border-radius: 12px;
    background: var(--accent); color: var(--accent-ink);
    display: grid; place-items: center;
    font-size: 22px; font-weight: 700;
  }
  .site-head h1 { margin: 0; font-size: 20px; font-weight: 800; letter-spacing: 0.01em; text-wrap: balance; }
  .site-head p { margin: 2px 0 0; font-size: 13px; color: var(--muted); }

  /* ---------- layout ---------- */
  .cols { display: grid; grid-template-columns: 1fr; gap: 18px; }
  @media (min-width: 900px) {
    .cols { grid-template-columns: 400px 1fr; align-items: start; }
  }
  .panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    box-shadow: var(--shadow);
    padding: 22px;
  }
  .inputs { display: flex; flex-direction: column; gap: 26px; }
  .results { display: flex; flex-direction: column; gap: 18px; }

  .step-label { display: flex; align-items: baseline; gap: 8px; margin-bottom: 12px; }
  .step-no { font-size: 11px; font-weight: 700; letter-spacing: 0.12em; color: var(--accent); }
  .step-title { font-size: 15px; font-weight: 700; }
  .step-note { font-size: 12px; color: var(--muted); margin: -8px 0 12px; }

  /* ---------- MBTI toggles ---------- */
  .axis-row { margin-bottom: 12px; }
  .axis-name { font-size: 11.5px; color: var(--muted); margin-bottom: 4px; letter-spacing: 0.04em; }
  .seg { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
  .seg button {
    border: 1px solid var(--border); background: var(--surface);
    border-radius: 10px; padding: 8px 10px; cursor: pointer;
    display: flex; align-items: center; justify-content: center; gap: 7px;
    font-size: 13px; transition: background 0.15s, border-color 0.15s, color 0.15s;
  }
  .seg button .ltr { font-weight: 800; font-size: 15px; }
  .seg button[aria-pressed="true"] {
    background: var(--accent); border-color: var(--accent); color: var(--accent-ink);
  }
  .seg button:hover:not([aria-pressed="true"]) { border-color: var(--accent); }

  .type-now {
    margin-top: 16px; padding: 14px 16px; border-radius: 12px;
    background: var(--chip); display: flex; gap: 14px; align-items: center;
  }
  .type-code { font-size: 30px; font-weight: 800; letter-spacing: 0.05em; }
  .type-meta .type-label { font-weight: 700; font-size: 14px; }
  .type-meta .type-desc { font-size: 12px; color: var(--muted); margin-top: 2px; }

  /* ---------- vote form ---------- */
  .ind-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .ind-card {
    border: 1px solid var(--border); background: var(--surface);
    border-radius: 12px; padding: 10px 12px; cursor: pointer; text-align: left;
    display: flex; align-items: center; gap: 10px;
    transition: border-color 0.15s, background 0.15s;
  }
  .ind-card:hover { border-color: var(--accent); }
  .ind-card .tile {
    width: 34px; height: 34px; flex: none; border-radius: 9px;
    background: var(--chip); color: var(--accent);
    display: grid; place-items: center; font-weight: 700; font-size: 16px;
    transition: background 0.15s, color 0.15s;
  }
  .ind-card .ind-name { font-size: 12.5px; font-weight: 700; line-height: 1.35; }
  .ind-card[aria-pressed="true"] { border-color: var(--accent); background: var(--chip); }
  .ind-card[aria-pressed="true"] .tile { background: var(--accent); color: var(--accent-ink); }

  .vote-btn {
    margin-top: 14px; width: 100%;
    border: none; border-radius: 12px; padding: 12px 16px;
    background: var(--accent); color: var(--accent-ink);
    font-size: 14px; font-weight: 700; cursor: pointer;
    transition: opacity 0.15s;
  }
  .vote-btn:disabled { opacity: 0.45; cursor: not-allowed; }
  .vote-done {
    margin-top: 4px; padding: 14px 16px; border-radius: 12px;
    background: var(--chip); font-size: 13px; line-height: 1.7;
  }
  .vote-done b { color: var(--accent); }
  .vote-error { margin-top: 10px; font-size: 12.5px; color: var(--neg); }

  /* ---------- distribution chart ---------- */
  .panel-head { display: flex; align-items: baseline; gap: 10px; flex-wrap: wrap; margin-bottom: 4px; }
  .panel-head h2 { margin: 0; font-size: 17px; font-weight: 800; text-wrap: balance; }
  .n-badge {
    font-size: 11.5px; font-weight: 700; color: var(--accent);
    background: var(--chip); border-radius: 999px; padding: 2px 10px;
    font-variant-numeric: tabular-nums;
  }
  .demo-badge {
    font-size: 11px; font-weight: 700; color: var(--neg);
    border: 1px solid var(--neg); border-radius: 999px; padding: 1px 9px;
  }
  .panel-sub { font-size: 12px; color: var(--muted); margin: 0 0 14px; }

  .dist { display: flex; flex-direction: column; gap: 4px; }
  .dist-row {
    display: grid; grid-template-columns: 118px 1fr 84px;
    align-items: center; gap: 10px;
    border: 1px solid transparent; border-radius: 10px; padding: 6px 8px;
    background: none; cursor: pointer; width: 100%; text-align: left;
    transition: background 0.15s, border-color 0.15s;
  }
  .dist-row:hover { background: var(--chip); }
  .dist-row[data-current="true"] { border-color: var(--accent); background: var(--chip); }
  .dist-name { display: flex; align-items: center; gap: 8px; min-width: 0; }
  .dist-name .tile {
    width: 26px; height: 26px; flex: none; border-radius: 7px;
    background: var(--chip); color: var(--accent);
    display: grid; place-items: center; font-weight: 700; font-size: 12.5px;
  }
  .dist-row[data-current="true"] .dist-name .tile { background: var(--accent); color: var(--accent-ink); }
  .dist-name span:last-child { font-size: 12px; font-weight: 700; line-height: 1.3; }
  .dist-bar { height: 12px; border-radius: 4px; background: var(--track); overflow: hidden; }
  .dist-bar i {
    display: block; height: 100%; border-radius: 4px; background: var(--pos);
    min-width: 2px;
    transition: width 0.5s cubic-bezier(0.22, 1, 0.36, 1);
  }
  .dist-val { font-size: 12.5px; font-weight: 700; font-variant-numeric: tabular-nums; text-align: right; white-space: nowrap; }
  .dist-val small { color: var(--muted); font-weight: 600; }
  .chart-note { font-size: 11px; color: var(--muted); margin: 12px 0 0; }
  @media (max-width: 520px) {
    .dist-row { grid-template-columns: 104px 1fr 76px; gap: 8px; }
  }

  /* ---------- loading / error ---------- */
  .state-box { text-align: center; padding: 40px 16px; color: var(--muted); font-size: 13.5px; }
  .spinner {
    width: 26px; height: 26px; margin: 0 auto 12px;
    border: 3px solid var(--track); border-top-color: var(--accent);
    border-radius: 50%; animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .retry-btn {
    margin-top: 12px; border: 1px solid var(--border); background: var(--surface);
    border-radius: 10px; padding: 8px 20px; font-size: 13px; font-weight: 700; cursor: pointer;
  }
  .retry-btn:hover { border-color: var(--accent); }

  /* ---------- industry detail ---------- */
  .detail-head { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
  .detail-head .tile {
    width: 40px; height: 40px; flex: none; border-radius: 10px;
    background: var(--accent); color: var(--accent-ink);
    display: grid; place-items: center; font-weight: 700; font-size: 18px;
  }
  .detail-head h3 { margin: 0; font-size: 16px; font-weight: 800; }
  .detail-head p { margin: 0; font-size: 11.5px; color: var(--muted); }
  .detail-desc { font-size: 13px; color: var(--muted); margin: 0 0 14px; }

  .sec-title { font-size: 13.5px; font-weight: 700; margin: 0 0 10px; letter-spacing: 0.03em; }
  .sc-grid { display: grid; grid-template-columns: 1fr; gap: 16px; }
  @media (min-width: 720px) { .sc-grid { grid-template-columns: 1fr 1fr; } }
  .sc-list { list-style: none; margin: 0; padding: 0; display: flex; flex-direction: column; gap: 10px; }
  .sc-list li { display: flex; gap: 9px; font-size: 13px; }
  .sc-list li::before { flex: none; font-weight: 800; line-height: 1.7; }
  .sc-list.good li::before { content: "＋"; color: var(--pos); }
  .sc-list.warn li::before { content: "△"; color: var(--neg); }

  .role-chips { display: flex; flex-wrap: wrap; gap: 7px; }
  .role-chips span {
    background: var(--chip); border-radius: 999px; padding: 4px 13px;
    font-size: 12px; font-weight: 600;
  }
  .divider { border: none; border-top: 1px solid var(--border); margin: 18px 0; }

  /* ---------- industry MBTI distribution ---------- */
  .you-line { font-size: 12.5px; background: var(--chip); border-radius: 10px; padding: 8px 12px; margin: 0 0 12px; line-height: 1.7; }
  .you-line b { color: var(--accent); }
  .mbti-dist { display: flex; flex-direction: column; gap: 2px; }
  .m-row {
    display: grid; grid-template-columns: 104px 1fr 78px;
    align-items: center; gap: 10px; padding: 3px 8px;
    border-radius: 8px; border: 1px solid transparent;
  }
  .m-row .m-code { font-size: 12px; font-weight: 800; letter-spacing: 0.03em; white-space: nowrap; }
  .m-row[data-you="true"] { background: var(--chip); border-color: var(--accent); }
  .m-bar { height: 10px; border-radius: 4px; background: var(--track); overflow: hidden; }
  .m-bar i {
    display: block; height: 100%; border-radius: 4px; background: var(--pos);
    min-width: 2px; transition: width 0.5s cubic-bezier(0.22, 1, 0.36, 1);
  }
  .m-val { font-size: 11.5px; font-weight: 700; font-variant-numeric: tabular-nums; text-align: right; white-space: nowrap; }
  .m-val small { color: var(--muted); font-weight: 600; }
  .you-chip {
    display: inline-block; font-size: 10px; font-weight: 700;
    background: var(--accent); color: var(--accent-ink);
    border-radius: 999px; padding: 0 7px; margin-left: 6px; vertical-align: 1px;
  }
  .mini-state { color: var(--muted); font-size: 12.5px; padding: 10px 0; }

  footer.note {
    margin-top: 26px; font-size: 11.5px; color: var(--muted); text-align: center; line-height: 1.8;
  }

  @media (prefers-reduced-motion: reduce) {
    * { transition: none !important; animation: none !important; }
  }
</style>
</head>
<body>
<div class="app">
  <header class="site-head">
    <div class="mark" aria-hidden="true">相</div>
    <div>
      <h1>MBTI × 志望業界 傾向診断</h1>

  <div class="cols">

        <div class="type-now">
          <div class="type-code" id="typeCode"></div>
          <div class="type-meta">
            <div class="type-label" id="typeLabel"></div>
            <div class="type-desc" id="typeDesc"></div>
          </div>
        </div>
      </div>
      <div>
        <div class="step-label"><span class="step-no">STEP 2</span><span class="step-title">あなたの志望業界を投稿</span></div>

        <div id="voteArea"></div>
      </div>
    </section>

    <section class="results" aria-label="傾向グラフと業界詳細">
      <div class="panel" id="chartPanel" aria-live="polite"></div>
      <div class="panel" id="detailPanel"></div>
    </section>
  </div>

  <footer class="note">
    本アプリの傾向データは訪問者の投稿(+初期シードデータ)にもとづく参考コンテンツです。<br>
    適職・適性を保証するものではありません。業界研究のきっかけとしてお楽しみください。
  </footer>
</div>

// タイプ×業界の定性コメント(強み/ギャップ)。スコアは計算しない。
function typeComments(code, ind) {
  const strengths = [], cautions = [];
  AXES.forEach((a, i) => {
    const w = ind.w[a.key] || 0;
    if (Math.abs(w) < 0.5 || !ind.axes[a.key]) return;
    const v = code[i] === a.pos ? 1 : -1;
    if (v * w > 0) strengths.push(ind.axes[a.key].s);
    else cautions.push(ind.axes[a.key].c);
  });
  if (strengths.length === 0) strengths.push(ind.fs);
  if (cautions.length === 0) cautions.push(ind.fc);
  return { strengths, cautions };
}

    let s = 50;
    AXES.forEach((a, i) => {
      const v = code[i] === a.pos ? 1 : -1;
      s += v * (ind.w[a.key] || 0) * 10;
    });
    return { id: ind.id, s };
  });
  const maxS = Math.max(...scores.map((x) => x.s));
  const exps = scores.map((x) => ({ id: x.id, e: Math.exp((x.s - maxS) / T) }));
  const denom = exps.reduce((acc, x) => acc + x.e, 0);
  const items = exps.map((x) => ({
    industry: x.id,
    count: 1 + Math.round((TOTAL - INDUSTRIES.length) * x.e / denom)
  }));
  items.sort((a, b) => b.count - a.count);
  return { type: code, total: items.reduce((acc, i) => acc + i.count, 0), items };
}

// デモモード用: 業界→MBTI分布(全16タイプのdemoStatsから逆引き)
function demoIndustryStats(industryId) {
  const items = Object.keys(TYPES).map((code) => {
    const found = demoStats(code).items.find((i) => i.industry === industryId);
    return { type: code, count: found ? found.count : 0 };
  });
  items.sort((a, b) => b.count - a.count);
  return { industry: industryId, total: items.reduce((acc, i) => acc + i.count, 0), items };
}
/*__END_DATA_AND_LOGIC__*/

// ---------- state & rendering ----------
const VOTE_KEY = "mbtiCareerVote";
const state = {
  poles: { EI: "I", SN: "N", TF: "T", JP: "J" },
  detailIndustry: null,   // グラフでクリックした業界(詳細表示)
  voteChoices: [],        // 投稿フォームで選択中の業界(複数可)
  voting: false,
  voteError: null,
  stats: null,            // 現在タイプの取得済み分布
  loading: false,
  error: null,
  industryStats: null,    // 詳細表示中の業界のMBTI分布
  industryLoading: false,
  industryError: null
};

const $ = (id) => document.getElementById(id);
const IND = (id) => INDUSTRIES.find((i) => i.id === id);
const isDemo = () => API_URL === "";

function currentType() {
  return AXES.map((a) => state.poles[a.key]).join("");
}

function esc(s) {
  return s.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
}

function savedVote() {
  try {
    const v = JSON.parse(localStorage.getItem(VOTE_KEY) || "null");
    if (!v || !TYPES[v.type]) return null;
    const industries = v.industries || (v.industry ? [v.industry] : []); // 旧形式互換
    if (industries.length === 0 || industries.some((i) => !IND(i))) return null;
    if (v.demo && !isDemo()) return null; // デモ中の投稿は本番では無効
    return { ...v, industries };
  } catch { return null; }
}

// ---------- data fetching ----------
let fetchSeq = 0;
async function loadStats() {
  const code = currentType();
  if (isDemo()) {
    state.stats = demoStats(code);
    state.loading = false;
    state.error = null;
    renderChart();
    return;
  }
  const seq = ++fetchSeq;
  state.loading = true;
  state.error = null;
  renderChart();
  try {
    const res = await fetch(`${API_URL}/stats?type=${code}`);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    if (seq !== fetchSeq) return; // 古いレスポンスは捨てる
    state.stats = data;
    state.loading = false;
  } catch (e) {
    if (seq !== fetchSeq) return;
    state.loading = false;
    state.error = "データを取得できませんでした。通信環境を確認してください。";
  }
  renderChart();
}

async function submitVote() {
  const code = currentType();
  const industries = state.voteChoices;
  if (industries.length === 0 || savedVote()) return;
  state.voting = true;
  state.voteError = null;
  renderVoteArea();
  try {
    if (isDemo()) {
      await new Promise((r) => setTimeout(r, 300));
    } else {
      const res = await fetch(`${API_URL}/vote`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ type: code, industries })
      });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
    }
    localStorage.setItem(VOTE_KEY, JSON.stringify({
      type: code, industries, at: new Date().toISOString(), demo: isDemo()
    }));
    state.voting = false;
    renderVoteArea();
    loadStats();     // 自分の票をタイプ別グラフに反映
    loadIndustry();  // 表示中の業界のMBTI分布にも反映
  } catch (e) {
    state.voting = false;
    state.voteError = "投稿に失敗しました。時間をおいて再度お試しください。";
    renderVoteArea();
  }
}

let industrySeq = 0;
async function loadIndustry() {
  const id = state.detailIndustry;
  if (!id) return;
  if (isDemo()) {
    state.industryStats = demoIndustryStats(id);
    state.industryLoading = false;
    state.industryError = null;
    renderDetail();
    return;
  }
  const seq = ++industrySeq;
  state.industryStats = null;
  state.industryLoading = true;
  state.industryError = null;
  renderDetail();
  try {
    const res = await fetch(`${API_URL}/industry?id=${id}`);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    if (seq !== industrySeq) return;
    state.industryStats = data;
    state.industryLoading = false;
  } catch (e) {
    if (seq !== industrySeq) return;
    state.industryLoading = false;
    state.industryError = "MBTI分布を取得できませんでした。";
  }
  renderDetail();
}

// ---------- rendering ----------
function renderToggles() {
  $("axisToggles").innerHTML = AXES.map((a) => `
    <div class="axis-row">
      <div class="axis-name">${a.name}</div>
      <div class="seg" role="group" aria-label="${a.name}">
        <button type="button" data-axis="${a.key}" data-pole="${a.pos}" aria-pressed="${state.poles[a.key] === a.pos}">
          <span class="ltr">${a.pos}</span><span>${a.posLabel}</span>
        </button>
        <button type="button" data-axis="${a.key}" data-pole="${a.neg}" aria-pressed="${state.poles[a.key] === a.neg}">
          <span class="ltr">${a.neg}</span><span>${a.negLabel}</span>
        </button>
      </div>
    </div>`).join("");
  $("axisToggles").querySelectorAll("button").forEach((btn) => {
    btn.addEventListener("click", () => {
      state.poles[btn.dataset.axis] = btn.dataset.pole;
      renderToggles();
      renderTypeNow();
      renderVoteArea();
      renderDetail();
      loadStats();
    });
  });
}

function renderTypeNow() {
  const code = currentType();
  const t = TYPES[code];
  $("typeCode").textContent = code;
  $("typeLabel").textContent = t.label;
  $("typeDesc").textContent = t.desc;
}

function renderVoteArea() {
  const area = $("voteArea");
  const done = savedVote();
  if (done) {
    const names = done.industries.map((id) => IND(id).name).join("、");
    area.innerHTML = `
      <div class="vote-done">
        <b>✓ 投稿ありがとうございました</b><br>
        ${esc(done.type)} × ${esc(names)} として集計されています。${done.demo ? "(デモモードのため保存されていません)" : ""}
      </div>`;
    return;
  }
  const code = currentType();
  const n = state.voteChoices.length;
  const btnLabel = state.voting ? "送信中…"
    : n === 0 ? "業界を選んで投稿する(複数選択可)"
    : n === 1 ? `${code} × ${esc(IND(state.voteChoices[0]).name)} で投稿する`
    : `${code} × ${n}業界で投稿する`;
  area.innerHTML = `
    <div class="ind-grid">${INDUSTRIES.map((ind) => `
      <button type="button" class="ind-card" data-id="${ind.id}" aria-pressed="${state.voteChoices.includes(ind.id)}">
        <span class="tile" aria-hidden="true">${ind.kanji}</span>
        <span class="ind-name">${esc(ind.name)}</span>
      </button>`).join("")}
    </div>
    <button type="button" class="vote-btn" id="voteBtn" ${n > 0 && !state.voting ? "" : "disabled"}>
      ${btnLabel}
    </button>
    ${state.voteError ? `<p class="vote-error">${esc(state.voteError)}</p>` : ""}`;
  area.querySelectorAll(".ind-card").forEach((btn) => {
    btn.addEventListener("click", () => {
      const id = btn.dataset.id;
      const i = state.voteChoices.indexOf(id);
      if (i >= 0) {
        state.voteChoices.splice(i, 1);
      } else {
        state.voteChoices.push(id);
        if (state.detailIndustry !== id) {
          state.detailIndustry = id; // 選んだ業界の詳細も見せる
          loadIndustry();
        }
      }
      renderVoteArea();
      renderChart();
      renderDetail();
    });
  });
  const voteBtn = $("voteBtn");
  if (voteBtn) voteBtn.addEventListener("click", submitVote);
}

function renderChart() {
  const panel = $("chartPanel");
  const code = currentType();
  const t = TYPES[code];
  const head = `
    <div class="panel-head">
      <h2>${code}(${esc(t.label)})の人の志望業界</h2>
      ${state.stats && !state.loading && !state.error ? `<span class="n-badge">n=${state.stats.total}票</span>` : ""}
      ${isDemo() ? `<span class="demo-badge">デモデータ(API未接続)</span>` : ""}
    </div>
    <p class="panel-sub">同じMBTIタイプの人の投稿から集計しています。業界名をクリックすると詳細が見られます。</p>`;

  if (state.loading) {
    panel.innerHTML = head + `<div class="state-box"><div class="spinner" aria-hidden="true"></div>読み込み中…</div>`;
    return;
  }
  if (state.error) {
    panel.innerHTML = head + `
      <div class="state-box">
        ${esc(state.error)}<br>
        <button type="button" class="retry-btn" id="retryBtn">再試行</button>
      </div>`;
    $("retryBtn").addEventListener("click", loadStats);
    return;
  }
  if (!state.stats) { panel.innerHTML = head; return; }

  const total = state.stats.total || 1;
  const max = Math.max(...state.stats.items.map((i) => i.count), 1);
  const rows = state.stats.items.map((item) => {
    const ind = IND(item.industry);
    if (!ind) return "";
    const pct = Math.round(100 * item.count / total);
    return `
      <button type="button" class="dist-row" data-id="${ind.id}"
        data-current="${state.detailIndustry === ind.id}"
        title="${esc(ind.name)}: ${item.count}票 / ${total}票中 (${pct}%)">
        <span class="dist-name"><span class="tile" aria-hidden="true">${ind.kanji}</span><span>${esc(ind.name)}</span></span>
        <span class="dist-bar"><i style="width:${(100 * item.count / max).toFixed(1)}%"></i></span>
        <span class="dist-val">${pct}% <small>(${item.count})</small></span>
      </button>`;
  }).join("");
  panel.innerHTML = head + `<div class="dist">${rows}</div>
    <p class="chart-note">割合はこのタイプの総投票数(複数回答可)に対するもの。投稿すると即座に反映されます。</p>`;
  panel.querySelectorAll(".dist-row").forEach((btn) => {
    btn.addEventListener("click", () => {
      if (state.detailIndustry !== btn.dataset.id) {
        state.detailIndustry = btn.dataset.id;
        loadIndustry();
      }
      renderChart();
      renderDetail();
    });
  });
}

function mbtiDistHtml() {
  if (state.industryLoading) {
    return `<div class="mini-state">MBTI分布を読み込み中…</div>`;
  }
  if (state.industryError) {
    return `<div class="mini-state">${esc(state.industryError)}
      <button type="button" class="retry-btn" id="indRetryBtn" style="margin-top:8px;padding:5px 16px">再試行</button></div>`;
  }
  const st = state.industryStats;
  if (!st || st.industry !== state.detailIndustry) {
    return `<div class="mini-state">読み込み中…</div>`;
  }
  const code = currentType();
  const total = st.total || 1;
  const max = Math.max(...st.items.map((i) => i.count), 1);
  const rankIdx = st.items.findIndex((i) => i.type === code);
  const mine = rankIdx >= 0 ? st.items[rankIdx] : null;
  const youLine = mine && mine.count > 0
    ? `あなたと同じ <b>${code}</b> は、この業界の投稿の <b>${Math.round(100 * mine.count / total)}%</b>(${st.items.length}タイプ中 ${rankIdx + 1}位)を占めています。`
    : `この業界にはまだ <b>${code}</b> の投稿がありません。最初の1票を入れてみましょう。`;
  const rows = st.items.map((item) => {
    const pct = Math.round(100 * item.count / total);
    const you = item.type === code;
    return `
      <div class="m-row" data-you="${you}" title="${item.type}(${esc(TYPES[item.type].label)}): ${item.count}票 (${pct}%)">
        <span class="m-code">${item.type}${you ? `<span class="you-chip">あなた</span>` : ""}</span>
        <span class="m-bar"><i style="width:${(100 * item.count / max).toFixed(1)}%"></i></span>
        <span class="m-val">${pct}% <small>(${item.count})</small></span>
      </div>`;
  }).join("");
  return `<p class="you-line">${youLine}</p><div class="mbti-dist">${rows}</div>`;
}

function renderDetail() {
  const panel = $("detailPanel");
  if (!state.detailIndustry) {
    panel.innerHTML = `<div class="state-box">グラフの業界名をクリックすると、その業界を志望する人の<br>MBTI分布と、あなたのタイプ向けのコメントが表示されます。</div>`;
    return;
  }
  const ind = IND(state.detailIndustry);
  const code = currentType();
  const { strengths, cautions } = typeComments(code, ind);
  const nTotal = state.industryStats && state.industryStats.industry === state.detailIndustry
    ? `<span class="n-badge">n=${state.industryStats.total}票</span>` : "";
  panel.innerHTML = `
    <div class="detail-head">
      <span class="tile" aria-hidden="true">${ind.kanji}</span>
      <div>
        <h3>${esc(ind.name)}</h3>
        <p>${code}(${esc(TYPES[code].label)})から見た業界情報</p>
      </div>
    </div>
    <p class="detail-desc">${esc(ind.desc)}</p>
    <div class="panel-head"><p class="sec-title" style="margin:0">この業界を志望する人のMBTI分布</p>${nTotal}</div>
    ${mbtiDistHtml()}
    <hr class="divider">
    <div class="sc-grid">
      <div>
        <p class="sec-title">この業界で活きる強み</p>
        <ul class="sc-list good">${strengths.map((s) => `<li>${esc(s)}</li>`).join("")}</ul>
      </div>
      <div>
        <p class="sec-title">意識したいギャップ</p>
        <ul class="sc-list warn">${cautions.map((s) => `<li>${esc(s)}</li>`).join("")}</ul>
      </div>
    </div>
    <hr class="divider">
    <p class="sec-title">代表的な職種</p>
    <div class="role-chips">${ind.roles.map((r) => `<span>${esc(r)}</span>`).join("")}</div>`;
  const retry = $("indRetryBtn");
  if (retry) retry.addEventListener("click", loadIndustry);
}

renderToggles();
renderTypeNow();
renderVoteArea();
renderDetail();
loadStats();
</script>
</body>
